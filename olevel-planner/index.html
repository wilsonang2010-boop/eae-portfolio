<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>O-Level Planner · 2026</title>
<style>
  :root{
    --bg:#0a0b0d;
    --surface:#121417;
    --surface2:#191c20;
    --border:rgba(255,255,255,.08);
    --border-soft:rgba(255,255,255,.05);
    --text:#ececee;
    --muted:#8f959c;
    --faint:#5c6167;
    --green:#30d158;
    --amber:#ff9f0a;
    --blue:#0a84ff;
    --red:#ff453a;
    --math:#6ea8fe;
    --phys:#64d2ff;
    --chem:#c792ea;
    --eng:#f2b880;
    --rev:#8f959c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:ui-sans-serif,-apple-system,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:14px;line-height:1.5;
    padding-bottom:64px;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px}

  /* ---------- header ---------- */
  header{padding:28px 0 0}
  .brand{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .countdown{margin-top:10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .cd-days{font-size:44px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .cd-hms{font-size:20px;font-weight:500;color:var(--muted);font-variant-numeric:tabular-nums}
  .cd-caption{width:100%;margin-top:4px;color:var(--muted);font-size:13px}
  .cd-caption strong{color:var(--text);font-weight:600}

  .phase{
    margin-top:16px;display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:10px 14px;
  }
  .phase-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .phase-name{font-weight:600}
  .phase-range{color:var(--muted);font-size:13px;margin-left:auto;text-align:right}

  /* ---------- key dates ---------- */
  .keydates{display:flex;gap:8px;overflow-x:auto;padding:14px 0 2px;scrollbar-width:none}
  .keydates::-webkit-scrollbar{display:none}
  .kd{
    flex:none;background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;
    padding:6px 10px;font-size:12px;color:var(--muted);white-space:nowrap;
  }
  .kd b{color:var(--text);font-weight:600;display:block;font-size:12px}
  .kd.past{opacity:.4}

  /* ---------- stats ---------- */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .stat-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat-value{font-size:28px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .stat-value .unit{font-size:14px;color:var(--muted);font-weight:500;margin-left:2px}

  /* ---------- tabs ---------- */
  .seg{
    display:grid;grid-template-columns:1fr 1fr;gap:4px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:4px;margin:18px 0 16px;
  }
  .seg button{
    appearance:none;border:0;background:transparent;color:var(--muted);
    font:inherit;font-weight:600;padding:8px;border-radius:7px;cursor:pointer;
  }
  .seg button.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 0 rgba(0,0,0,.3)}

  /* ---------- week nav ---------- */
  .weeknav{display:flex;align-items:center;gap:8px}
  .weeknav h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .weeknav .sub{font-size:12px;color:var(--muted)}
  .wn-btn{
    appearance:none;background:var(--surface);border:1px solid var(--border);color:var(--text);
    width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;flex:none;line-height:1;
  }
  .wn-btn:disabled{opacity:.3;cursor:default}
  .wn-mid{flex:1;text-align:center}
  .today-btn{
    appearance:none;background:none;border:0;color:var(--blue);font:inherit;font-size:12px;
    font-weight:600;cursor:pointer;padding:2px 4px;
  }

  /* ---------- hours bar ---------- */
  .hoursbar{margin:14px 0 4px}
  .hb-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
  .hb-row b{color:var(--text);font-variant-numeric:tabular-nums}
  .hb-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .hb-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s ease}
  .hb-fill.over{background:var(--blue)}

  /* ---------- day cards ---------- */
  .day{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    margin-top:10px;overflow:hidden;
  }
  .day.past{opacity:.55}
  .day.today{border-color:rgba(255,255,255,.22)}
  .day-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border-soft)}
  .day-name{font-weight:700;font-size:13px}
  .day-date{color:var(--muted);font-size:13px}
  .badge{
    font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 7px;border-radius:5px;
  }
  .badge.today-b{background:rgba(255,255,255,.12);color:var(--text)}
  .badge.rest-b{background:rgba(143,149,156,.15);color:var(--muted)}
  .badge.event-b{background:rgba(255,159,10,.15);color:var(--amber)}
  .day-body{padding:4px 0}

  .sess{display:flex;align-items:flex-start;gap:11px;padding:10px 14px}
  .sess + .sess{border-top:1px solid var(--border-soft)}
  .cb{
    appearance:none;width:19px;height:19px;border:1.5px solid var(--faint);border-radius:6px;
    cursor:pointer;flex:none;margin-top:1px;position:relative;background:transparent;
  }
  .cb:checked{background:var(--green);border-color:var(--green)}
  .cb:checked::after{
    content:"";position:absolute;left:5.5px;top:2.5px;width:4px;height:8px;
    border:solid #08210f;border-width:0 2px 2px 0;transform:rotate(45deg);
  }
  .sess-main{flex:1;min-width:0}
  .sess-title{font-weight:500;font-size:13.5px}
  .sess input:checked ~ .sess-main .sess-title{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(255,255,255,.3)}
  .sess-meta{display:flex;align-items:center;gap:6px;margin-top:2px;font-size:11.5px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;flex:none}
  .sess-del{
    appearance:none;background:none;border:0;color:var(--faint);cursor:pointer;
    font-size:15px;padding:0 2px;line-height:1;flex:none;
  }
  .sess.reatt .sess-title{color:var(--amber)}
  .sess.reatt .cb:checked ~ .sess-main .sess-title{color:var(--muted)}
  .overdue-tag{color:var(--red);font-weight:600}
  .rest-note{padding:12px 14px;color:var(--muted);font-size:13px}

  .add-row{padding:6px 14px 10px}
  .add-btn{
    appearance:none;background:none;border:0;color:var(--faint);font:inherit;font-size:12px;
    font-weight:600;cursor:pointer;padding:2px 0;
  }
  .add-btn:hover{color:var(--muted)}
  .add-form{display:flex;gap:6px;flex-wrap:wrap;padding:2px 0 4px}
  .add-form select,.add-form input{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    font:inherit;font-size:12.5px;border-radius:7px;padding:6px 8px;
  }
  .add-form input[type=text]{flex:1;min-width:120px}
  .add-form input[type=number]{width:64px}
  .add-form .mini{
    appearance:none;border:0;border-radius:7px;font:inherit;font-size:12.5px;font-weight:600;
    padding:6px 12px;cursor:pointer;background:var(--text);color:var(--bg);
  }
  .add-form .mini.ghost{background:transparent;color:var(--muted)}

  /* ---------- error log ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:10px}
  .card h3{font-size:13px;font-weight:700;margin-bottom:12px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .form-grid .full{grid-column:1/-1}
  label.f{display:block}
  label.f span{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px}
  .form-grid select,.form-grid input,.form-grid textarea{
    width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
    font:inherit;font-size:13px;border-radius:8px;padding:8px 10px;
  }
  .form-grid textarea{resize:vertical;min-height:52px}
  .primary{
    appearance:none;border:0;border-radius:9px;font:inherit;font-weight:600;font-size:13.5px;
    padding:10px 16px;cursor:pointer;background:var(--text);color:var(--bg);margin-top:12px;
  }
  .filters{display:flex;gap:8px;margin-top:14px}
  .filters select,.filters input{
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    font:inherit;font-size:13px;border-radius:8px;padding:7px 10px;
  }
  .filters input{flex:1;min-width:0}
  .err{padding:13px 16px}
  .err + .err{border-top:1px solid var(--border-soft)}
  .err-head{display:flex;align-items:baseline;gap:8px}
  .err-topic{font-weight:600;font-size:13.5px}
  .err-subj{font-size:11px;color:var(--muted)}
  .err-date{margin-left:auto;font-size:11px;color:var(--faint);flex:none}
  .err-body{margin-top:5px;font-size:13px}
  .err-body .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-right:5px}
  .err-body p{margin-top:2px}
  .err-foot{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px}
  .reatt-chip{color:var(--amber)}
  .reatt-chip.done{color:var(--green)}
  .err-del{appearance:none;background:none;border:0;color:var(--faint);font:inherit;font-size:12px;cursor:pointer;margin-left:auto}
  .empty{padding:28px 16px;text-align:center;color:var(--faint);font-size:13px}

  /* ---------- settings row ---------- */
  .settings{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--muted)}
  .settings select{
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    font:inherit;font-size:12px;border-radius:7px;padding:4px 8px;
  }

  footer{margin-top:36px;text-align:center;color:var(--faint);font-size:11px}

  @media (max-width:480px){
    .cd-days{font-size:38px}
    .stats{grid-template-columns:1fr 1fr}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">GCE O-Levels · Singapore 2026</div>
    <div class="countdown">
      <span class="cd-days" id="cdDays">–</span>
      <span class="cd-hms" id="cdHms">–:–:–</span>
      <span class="cd-caption">days to <strong>Mathematics Paper 1 — Wed 21 Oct</strong></span>
    </div>
    <div class="phase" id="phaseBanner"></div>
  </header>

  <div class="keydates" id="keydates"></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Math streak</div>
      <div class="stat-value" id="streakVal">0<span class="unit">days</span></div>
      <div class="stat-sub">consecutive post-gym blocks</div>
    </div>
    <div class="stat">
      <div class="stat-label">This week</div>
      <div class="stat-value" id="weekHoursVal">0<span class="unit">/ 9 h</span></div>
      <div class="stat-sub" id="weekHoursSub">hours completed</div>
    </div>
  </div>

  <nav class="seg">
    <button id="tabPlanner">Planner</button>
    <button id="tabErrors">Error log</button>
  </nav>

  <!-- ============ PLANNER ============ -->
  <section id="planner">
    <div class="weeknav">
      <button class="wn-btn" id="prevWeek" aria-label="Previous week">‹</button>
      <div class="wn-mid">
        <h2 id="weekTitle"></h2>
        <div class="sub" id="weekSub"></div>
        <button class="today-btn" id="jumpToday" hidden>Back to this week</button>
      </div>
      <button class="wn-btn" id="nextWeek" aria-label="Next week">›</button>
    </div>

    <div class="hoursbar">
      <div class="hb-row"><span>Viewed week</span><b id="hbLabel">0 / 9 h</b></div>
      <div class="hb-track"><div class="hb-fill" id="hbFill" style="width:0%"></div></div>
    </div>

    <div id="days"></div>

    <div class="settings">
      <span>Rest day</span>
      <select id="restDaySel">
        <option value="0">Sunday</option><option value="1">Monday</option>
        <option value="2">Tuesday</option><option value="3">Wednesday</option>
        <option value="4">Thursday</option><option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
      <span style="margin-left:auto">6 gym days → 6 post-gym math blocks</span>
    </div>
  </section>

  <!-- ============ ERROR LOG ============ -->
  <section id="errors" hidden>
    <div class="card">
      <h3>Log a mistake</h3>
      <form id="errForm">
        <div class="form-grid">
          <label class="f"><span>Subject</span>
            <select id="efSubject">
              <option>E-Math</option><option>A-Math</option><option>Physics</option>
              <option>Chemistry</option><option>English</option>
            </select>
          </label>
          <label class="f"><span>Date</span><input type="date" id="efDate" required></label>
          <label class="f full"><span>Topic</span><input type="text" id="efTopic" placeholder="e.g. Trig equations" required></label>
          <label class="f full"><span>What went wrong</span><textarea id="efMistake" placeholder="e.g. Forgot to check both quadrants" required></textarea></label>
          <label class="f full"><span>Correct method</span><textarea id="efFix" placeholder="e.g. Find basic angle first, then all solutions in range" required></textarea></label>
        </div>
        <button class="primary" type="submit">Add — schedules re-attempt in 4 days</button>
      </form>
    </div>

    <div class="filters">
      <select id="filterSubject">
        <option value="">All subjects</option>
        <option>E-Math</option><option>A-Math</option><option>Physics</option>
        <option>Chemistry</option><option>English</option>
      </select>
      <input type="search" id="filterTopic" placeholder="Filter by topic…">
    </div>

    <div class="card" style="padding:0" id="errListCard">
      <div id="errList"></div>
    </div>
  </section>

  <footer>All data is saved locally in this browser.</footer>
</div>

<script>
"use strict";

/* ================= constants ================= */
const MS_DAY = 864e5;
const START = new Date(2026, 6, 13);          // Mon 13 Jul 2026 (week 1)
const END   = new Date(2026, 10, 10);         // Tue 10 Nov 2026 (last paper)
const EXAM  = new Date(2026, 9, 21, 8, 0, 0); // Math Paper 1, Wed 21 Oct
const TARGET_MIN = 540;                       // 9 h/week
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const SUBJ_COLOR = {
  "Math":"var(--math)","E-Math":"var(--math)","A-Math":"var(--math)",
  "Physics":"var(--phys)","Chemistry":"var(--chem)","English":"var(--eng)","Review":"var(--rev)"
};

const KEY_DATES = [
  {d:"2026-09-01", label:"Listening compre window opens", short:"EL listening"},
  {d:"2026-09-30", label:"Science practicals begin",      short:"Practicals start"},
  {d:"2026-10-13", label:"Science practicals end",        short:"Practicals end"},
  {d:"2026-10-19", label:"English written paper",         short:"English paper"},
  {d:"2026-10-21", label:"Maths papers begin",            short:"Math P1"},
  {d:"2026-11-10", label:"Last written paper",            short:"Last paper"},
];

/* Math topic sequences — 6 sessions/week */
const ALG = [ // weeks 1–3, A-Math depth
  {t:"Indices — laws & solving index equations", tag:"A-Math depth"},
  {t:"Surds — simplifying & rationalising", tag:"A-Math depth"},
  {t:"Indices & surds — exam questions", tag:"A-Math depth"},
  {t:"Quadratics — factorising, formula, completing the square", tag:"A-Math depth"},
  {t:"Quadratics — discriminant & nature of roots", tag:"A-Math depth"},
  {t:"Quadratics — max/min value & sketching", tag:"A-Math depth"},
  {t:"Quadratic inequalities", tag:"A-Math depth"},
  {t:"Simultaneous equations — linear + non-linear", tag:"A-Math depth"},
  {t:"Sum & product of roots (α, β)", tag:"A-Math depth"},
  {t:"Algebraic fractions — simplifying", tag:"A-Math depth"},
  {t:"Algebraic fractions — solving equations", tag:"A-Math depth"},
  {t:"Mixed algebra — timed set 1", tag:"A-Math depth"},
  {t:"Equations reducible to quadratic form", tag:"A-Math depth"},
  {t:"Surds & indices — harder exam questions", tag:"A-Math depth"},
  {t:"Simultaneous equations — exam questions", tag:"A-Math depth"},
  {t:"Algebraic manipulation — exam set", tag:"A-Math depth"},
  {t:"Mixed algebra — timed set 2", tag:"A-Math depth"},
  {t:"Algebra checkpoint — re-attempt error-log items", tag:"Checkpoint"},
];
const TRIG = [ // weeks 4–6
  {t:"Sine rule — incl. ambiguous case", tag:"E-Math"},
  {t:"Cosine rule & area of triangle", tag:"E-Math"},
  {t:"Bearings with sine/cosine rule", tag:"E-Math"},
  {t:"Mensuration — arc length & sector area (radians)", tag:"E-Math"},
  {t:"Mensuration — cones, spheres, composite solids", tag:"E-Math"},
  {t:"3D trigonometry — angle between line & plane", tag:"E-Math"},
  {t:"3D trig + mensuration — exam questions", tag:"E-Math"},
  {t:"Trig ratios, special angles & graphs", tag:"A-Math"},
  {t:"Identities — sin²θ + cos²θ = 1, tan = sin/cos", tag:"A-Math"},
  {t:"Proving identities", tag:"A-Math"},
  {t:"Trig equations — basic intervals", tag:"A-Math"},
  {t:"Trig equations — double angle & harder", tag:"A-Math"},
  {t:"R-formula — a sinθ + b cosθ", tag:"A-Math"},
  {t:"R-formula — max/min & equations", tag:"A-Math"},
  {t:"Mixed trig — E-Math timed set", tag:"E-Math"},
  {t:"Mixed trig — A-Math timed set", tag:"A-Math"},
  {t:"Trig checkpoint — timed mini-paper", tag:"Checkpoint"},
  {t:"Trig checkpoint — re-attempt error-log items", tag:"Checkpoint"},
];
function paperWeek(paper){ // week 7 onward, alternating
  return [
    {t:paper+" Paper 1 — timed section", tag:"Timed"},
    {t:paper+" Paper 1 — finish & mark", tag:"Timed"},
    {t:paper+" — log & fix mistakes in error log", tag:"Review"},
    {t:paper+" Paper 2 — timed section", tag:"Timed"},
    {t:paper+" Paper 2 — finish & mark", tag:"Timed"},
    {t:"Weak-topic drill — algebra / trig", tag:"Drill"},
  ];
}

/* ================= state ================= */
const LS_KEY = "olp-2026-v1";
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && typeof s === "object")
      return Object.assign({completed:{}, custom:[], errors:[], restDay:0, tab:"planner"}, s);
  }catch(e){}
  return {completed:{}, custom:[], errors:[], restDay:0, tab:"planner"};
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ================= date helpers ================= */
const pad = n => String(n).padStart(2,"0");
const key = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const parseKey = k => { const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d); };
const addDays = (d,n) => new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
const todayDate = () => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); };
const weekIdxOf = d => Math.floor(Math.round((d - START)/MS_DAY)/7);
const TOTAL_WEEKS = weekIdxOf(END) + 1;

/* ================= schedule model ================= */
function subjectDays(){ // avoid the rest day; keep days distinct
  const used = new Set([state.restDay]);
  const place = pref => { let d = pref; while(used.has(d)) d = (d+1)%7; used.add(d); return d; };
  return { phys: place(2), chem: place(4), eng: place(6) }; // Tue / Thu / Sat preferred
}
function mathIdxInWeek(d){ // 0–5 among non-rest days, Mon-based week
  const monday = addDays(START, weekIdxOf(d)*7);
  let i = 0;
  for(let k=0;k<7;k++){
    const day = addDays(monday,k);
    if(day.getDay() === state.restDay) continue;
    if(day.getTime() === d.getTime()) return i;
    i++;
  }
  return 0;
}
function mathTopic(d){
  const w = weekIdxOf(d), i = mathIdxInWeek(d);
  if(w < 3)  return ALG[w*6+i]  || ALG[ALG.length-1];
  if(w < 6)  return TRIG[(w-3)*6+i] || TRIG[TRIG.length-1];
  const paper = ((w-6)%2 === 0) ? "E-Math (4052)" : "A-Math (4049)";
  return paperWeek(paper)[i] || paperWeek(paper)[5];
}
function phaseOf(d){
  if(d <= new Date(2026,7,31)) return {name:"Topical revision", range:"now – 31 Aug", color:"var(--blue)"};
  if(d <= new Date(2026,8,30)) return {name:"Prelims / timed papers", range:"1 – 30 Sep", color:"var(--amber)"};
  return {name:"Final review — no new material", range:"1 Oct onwards", color:"var(--green)"};
}
function weekPhaseLabel(w){
  if(w < 3)  return "Week "+(w+1)+" · Algebra (A-Math depth)";
  if(w < 6)  return "Week "+(w+1)+" · Trigonometry & mensuration";
  const paper = ((w-6)%2 === 0) ? "E-Math" : "A-Math";
  return "Week "+(w+1)+" · Timed papers — "+paper;
}
function sciLabel(subj, d){
  const p = phaseOf(d);
  if(d >= new Date(2026,8,7) && d <= new Date(2026,9,13))
    return subj+" — practical prep (planning, graphs, apparatus)";
  if(p.name.startsWith("Topical")) return subj+" — topical revision + TYS questions";
  if(p.name.startsWith("Prelims")) return subj+" — timed paper practice";
  return subj+" — final review + error-log re-attempts";
}
function engLabel(d){
  const p = phaseOf(d);
  if(d >= new Date(2026,8,1) && d <= new Date(2026,9,18))
    return "English — listening compre + comprehension practice";
  if(p.name.startsWith("Topical")) return "English — comprehension & summary practice";
  return "English — final review: situational writing formats";
}

/* Sessions scheduled for a given date */
function sessionsFor(d){
  const k = key(d), dow = d.getDay(), out = [];
  if(d < START || d > END) return out;
  if(dow === state.restDay){
    out.push({id:k+"|light", subject:"Review", title:"Light review only — read through error log (optional)", mins:20, light:true});
  } else {
    const topic = mathTopic(d);
    out.push({id:k+"|math", subject:"Math", title:topic.t, tag:topic.tag, mins:45, math:true, sub:"Post-gym math block · 40–45 min"});
    const sd = subjectDays();
    if(dow === sd.phys) out.push({id:k+"|phys", subject:"Physics",   title:sciLabel("Physics", d),   mins:45});
    if(dow === sd.chem) out.push({id:k+"|chem", subject:"Chemistry", title:sciLabel("Chemistry", d), mins:45});
    if(dow === sd.eng)  out.push({id:k+"|eng",  subject:"English",   title:engLabel(d),              mins:45});
  }
  for(const c of state.custom) if(c.date === k)
    out.push({id:c.id, subject:c.subject, title:c.title, mins:c.mins, custom:true});
  return out;
}

/* ================= streak ================= */
function streak(){
  const today = todayDate();
  const days = [];
  for(let d = START; d <= today && d <= END; d = addDays(d,1))
    if(d.getDay() !== state.restDay) days.push(key(d)+"|math");
  let i = days.length - 1, n = 0;
  if(i >= 0 && days[i].startsWith(key(today)) && !state.completed[days[i]]) i--; // today pending doesn't break it
  for(; i >= 0; i--){
    if(state.completed[days[i]]) n++;
    else break;
  }
  return n;
}

/* ================= rendering ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let viewWeek = Math.min(Math.max(weekIdxOf(todayDate()), 0), TOTAL_WEEKS-1);
let addFormDate = null;
let filters = {subject:"", topic:""};

function renderCountdown(){
  const diff = EXAM - new Date();
  if(diff <= 0){
    $("cdDays").textContent = "0";
    $("cdHms").textContent = "00:00:00";
    return;
  }
  const days = Math.floor(diff/MS_DAY);
  const h = Math.floor(diff%MS_DAY/36e5), m = Math.floor(diff%36e5/6e4), s = Math.floor(diff%6e4/1e3);
  $("cdDays").textContent = days;
  $("cdHms").textContent = pad(h)+":"+pad(m)+":"+pad(s);
}

function renderPhase(){
  const p = phaseOf(todayDate());
  $("phaseBanner").innerHTML =
    '<span class="phase-dot" style="background:'+p.color+'"></span>'+
    '<span class="phase-name">'+p.name+'</span>'+
    '<span class="phase-range">'+p.range+'</span>';
}

function renderKeyDates(){
  const t = key(todayDate());
  $("keydates").innerHTML = KEY_DATES.map(kd => {
    const d = parseKey(kd.d);
    return '<div class="kd'+(kd.d < t ? " past":"")+'"><b>'+DOW[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+'</b>'+kd.label+'</div>';
  }).join("");
}

function weekMinutes(w){
  const monday = addDays(START, w*7);
  let done = 0, total = 0;
  for(let i=0;i<7;i++){
    for(const s of sessionsFor(addDays(monday,i))){
      total += s.mins;
      if(state.completed[s.id]) done += s.mins;
    }
  }
  return {done, total};
}

function renderStats(){
  const n = streak();
  $("streakVal").innerHTML = n + '<span class="unit">'+(n===1?"day":"days")+'</span>';
  const cur = Math.min(Math.max(weekIdxOf(todayDate()),0), TOTAL_WEEKS-1);
  const {done} = weekMinutes(cur);
  $("weekHoursVal").innerHTML = (done/60).toFixed(1).replace(/\.0$/,"") + '<span class="unit">/ 9 h</span>';
  $("weekHoursSub").textContent = done >= TARGET_MIN ? "target hit — nice" : "hours completed";
}

function reattemptsFor(k){
  const t = key(todayDate());
  return state.errors.filter(e => {
    const due = key(addDays(parseKey(e.date), 4));
    if(due === k) return true;
    if(k === t && !e.reattemptDone && due < t) return true; // overdue → surface today
    return false;
  }).map(e => {
    const due = key(addDays(parseKey(e.date), 4));
    return {e, overdue: due < t && !e.reattemptDone && k === t && due !== k};
  });
}

function renderWeek(){
  const monday = addDays(START, viewWeek*7);
  const sunday = addDays(monday, 6);
  const t = todayDate(), tk = key(t);
  $("weekTitle").textContent = monday.getDate()+" "+MONTHS[monday.getMonth()]+" – "+sunday.getDate()+" "+MONTHS[sunday.getMonth()];
  $("weekSub").textContent = weekPhaseLabel(viewWeek);
  $("prevWeek").disabled = viewWeek === 0;
  $("nextWeek").disabled = viewWeek === TOTAL_WEEKS-1;
  const curW = Math.min(Math.max(weekIdxOf(t),0), TOTAL_WEEKS-1);
  $("jumpToday").hidden = viewWeek === curW;

  const {done, total} = weekMinutes(viewWeek);
  $("hbLabel").textContent = (done/60).toFixed(1).replace(/\.0$/,"")+" / 9 h · "+Math.round(total/60*10)/10+" h planned";
  const pct = Math.min(100, done/TARGET_MIN*100);
  $("hbFill").style.width = pct+"%";
  $("hbFill").classList.toggle("over", done >= TARGET_MIN);

  let html = "";
  for(let i=0;i<7;i++){
    const d = addDays(monday,i), k = key(d);
    if(d > END){ continue; }
    const isToday = k === tk, isPast = d < t;
    const rest = d.getDay() === state.restDay;
    const events = KEY_DATES.filter(kd => kd.d === k);

    let body = "";
    const sess = sessionsFor(d);
    for(const s of sess){
      const checked = state.completed[s.id] ? " checked" : "";
      const color = SUBJ_COLOR[s.subject] || "var(--rev)";
      body +=
        '<label class="sess">'+
          '<input type="checkbox" class="cb" data-sid="'+esc(s.id)+'"'+checked+'>'+
          '<span class="sess-main">'+
            '<span class="sess-title">'+esc(s.title)+'</span>'+
            '<span class="sess-meta"><span class="dot" style="background:'+color+'"></span>'+
              esc(s.sub || s.subject)+' · '+s.mins+' min'+(s.tag ? ' · '+esc(s.tag):"")+
            '</span>'+
          '</span>'+
          (s.custom ? '<button class="sess-del" data-del-custom="'+esc(s.id)+'" title="Remove">×</button>' : "")+
        '</label>';
    }
    for(const {e, overdue} of reattemptsFor(k)){
      const checked = e.reattemptDone ? " checked" : "";
      body +=
        '<label class="sess reatt">'+
          '<input type="checkbox" class="cb" data-reatt="'+esc(e.id)+'"'+checked+'>'+
          '<span class="sess-main">'+
            '<span class="sess-title">Re-attempt: '+esc(e.topic)+'</span>'+
            '<span class="sess-meta"><span class="dot" style="background:'+(SUBJ_COLOR[e.subject]||"var(--rev)")+'"></span>'+
              esc(e.subject)+' · from error log'+(overdue ? ' · <span class="overdue-tag">overdue</span>':"")+
            '</span>'+
          '</span>'+
        '</label>';
    }
    if(!rest){
      body += '<div class="add-row">';
      if(addFormDate === k){
        body +=
          '<div class="add-form" data-date="'+k+'">'+
            '<select id="asSubject"><option>E-Math</option><option>A-Math</option><option>Physics</option><option>Chemistry</option><option>English</option><option>Review</option></select>'+
            '<input type="text" id="asTitle" placeholder="What will you do?">'+
            '<input type="number" id="asMins" value="30" min="5" max="240" step="5">'+
            '<button class="mini" data-add-save="'+k+'">Add</button>'+
            '<button class="mini ghost" data-add-cancel>Cancel</button>'+
          '</div>';
      } else {
        body += '<button class="add-btn" data-add="'+k+'">+ Add session</button>';
      }
      body += '</div>';
    } else if(sess.length <= 1){
      body += '<div class="rest-note">No scheduled study — recover well.</div>';
    }

    html +=
      '<div class="day'+(isToday?" today":"")+(isPast?" past":"")+'">'+
        '<div class="day-head">'+
          '<span class="day-name">'+DOW[d.getDay()]+'</span>'+
          '<span class="day-date">'+d.getDate()+' '+MONTHS[d.getMonth()]+'</span>'+
          (isToday ? '<span class="badge today-b">Today</span>' : "")+
          (rest ? '<span class="badge rest-b">Rest day</span>' : "")+
          events.map(ev => '<span class="badge event-b">'+esc(ev.short)+'</span>').join("")+
        '</div>'+
        '<div class="day-body">'+body+'</div>'+
      '</div>';
  }
  $("days").innerHTML = html;

  const af = document.querySelector(".add-form #asTitle");
  if(af) af.focus();
}

function renderErrors(){
  const list = state.errors
    .filter(e => (!filters.subject || e.subject === filters.subject))
    .filter(e => (!filters.topic || (e.topic+" "+e.mistake).toLowerCase().includes(filters.topic.toLowerCase())))
    .slice()
    .sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  if(!list.length){
    $("errList").innerHTML = '<div class="empty">'+
      (state.errors.length ? "Nothing matches these filters." :
       "No mistakes logged yet. Every logged mistake gets a re-attempt reminder 4 days later.")+'</div>';
    return;
  }
  const t = key(todayDate());
  $("errList").innerHTML = list.map(e => {
    const dd = parseKey(e.date), due = addDays(dd,4), dueK = key(due);
    const reattTxt = e.reattemptDone
      ? "Re-attempted ✓"
      : "Re-attempt " + (dueK < t ? "overdue — was due " : "due ") + DOW[due.getDay()]+" "+due.getDate()+" "+MONTHS[due.getMonth()];
    return '<div class="err">'+
      '<div class="err-head">'+
        '<span class="dot" style="background:'+(SUBJ_COLOR[e.subject]||"var(--rev)")+';margin-top:0"></span>'+
        '<span class="err-topic">'+esc(e.topic)+'</span>'+
        '<span class="err-subj">'+esc(e.subject)+'</span>'+
        '<span class="err-date">'+dd.getDate()+' '+MONTHS[dd.getMonth()]+'</span>'+
      '</div>'+
      '<div class="err-body"><span class="lbl">Mistake</span>'+esc(e.mistake)+
        '<p><span class="lbl">Fix</span>'+esc(e.fix)+'</p></div>'+
      '<div class="err-foot">'+
        '<span class="reatt-chip'+(e.reattemptDone?" done":"")+'">'+reattTxt+'</span>'+
        '<button class="err-del" data-del-err="'+esc(e.id)+'">Delete</button>'+
      '</div>'+
    '</div>';
  }).join("");
}

function renderTab(){
  const planner = state.tab !== "errors";
  $("planner").hidden = !planner;
  $("errors").hidden = planner;
  $("tabPlanner").classList.toggle("active", planner);
  $("tabErrors").classList.toggle("active", !planner);
}

function renderAll(){
  renderPhase(); renderKeyDates(); renderStats(); renderWeek(); renderErrors(); renderTab();
  $("restDaySel").value = String(state.restDay);
}

/* ================= events ================= */
document.addEventListener("change", ev => {
  const el = ev.target;
  if(el.dataset.sid !== undefined){
    if(el.checked) state.completed[el.dataset.sid] = true;
    else delete state.completed[el.dataset.sid];
    save(); renderStats(); renderWeek();
  } else if(el.dataset.reatt !== undefined){
    const e = state.errors.find(x => x.id === el.dataset.reatt);
    if(e){ e.reattemptDone = el.checked; save(); renderWeek(); renderErrors(); }
  }
});

document.addEventListener("click", ev => {
  const el = ev.target.closest("[data-add],[data-add-save],[data-add-cancel],[data-del-custom],[data-del-err]");
  if(!el) return;
  if(el.dataset.add !== undefined){
    addFormDate = el.dataset.add; renderWeek();
  } else if(el.dataset.addCancel !== undefined){
    addFormDate = null; renderWeek();
  } else if(el.dataset.addSave !== undefined){
    ev.preventDefault();
    const form = el.closest(".add-form");
    const title = form.querySelector("#asTitle").value.trim();
    const mins = Math.max(5, Math.min(240, parseInt(form.querySelector("#asMins").value,10) || 30));
    if(!title) { form.querySelector("#asTitle").focus(); return; }
    state.custom.push({
      id:"c"+Date.now()+Math.random().toString(36).slice(2,6),
      date: el.dataset.addSave,
      subject: form.querySelector("#asSubject").value,
      title, mins
    });
    addFormDate = null; save(); renderStats(); renderWeek();
  } else if(el.dataset.delCustom !== undefined){
    ev.preventDefault();
    state.custom = state.custom.filter(c => c.id !== el.dataset.delCustom);
    delete state.completed[el.dataset.delCustom];
    save(); renderStats(); renderWeek();
  } else if(el.dataset.delErr !== undefined){
    state.errors = state.errors.filter(e => e.id !== el.dataset.delErr);
    save(); renderErrors(); renderWeek();
  }
});

$("prevWeek").addEventListener("click", () => { if(viewWeek>0){ viewWeek--; addFormDate=null; renderWeek(); } });
$("nextWeek").addEventListener("click", () => { if(viewWeek<TOTAL_WEEKS-1){ viewWeek++; addFormDate=null; renderWeek(); } });
$("jumpToday").addEventListener("click", () => {
  viewWeek = Math.min(Math.max(weekIdxOf(todayDate()),0), TOTAL_WEEKS-1);
  addFormDate = null; renderWeek();
});
$("tabPlanner").addEventListener("click", () => { state.tab="planner"; save(); renderTab(); });
$("tabErrors").addEventListener("click", () => { state.tab="errors"; save(); renderTab(); });
$("restDaySel").addEventListener("change", ev => {
  state.restDay = parseInt(ev.target.value,10); save(); renderAll();
});

$("errForm").addEventListener("submit", ev => {
  ev.preventDefault();
  const entry = {
    id:"e"+Date.now()+Math.random().toString(36).slice(2,6),
    subject: $("efSubject").value,
    topic: $("efTopic").value.trim(),
    mistake: $("efMistake").value.trim(),
    fix: $("efFix").value.trim(),
    date: $("efDate").value || key(todayDate()),
    reattemptDone: false
  };
  if(!entry.topic || !entry.mistake || !entry.fix) return;
  state.errors.push(entry);
  save();
  $("efTopic").value = ""; $("efMistake").value = ""; $("efFix").value = "";
  renderErrors(); renderWeek();
});
$("filterSubject").addEventListener("change", ev => { filters.subject = ev.target.value; renderErrors(); });
$("filterTopic").addEventListener("input", ev => { filters.topic = ev.target.value; renderErrors(); });

/* ================= init ================= */
$("efDate").value = key(todayDate());
renderAll();
renderCountdown();
setInterval(renderCountdown, 1000);
setInterval(() => { renderPhase(); renderStats(); }, 60000);
</script>
</body>
</html>
