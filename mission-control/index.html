<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b16">
<title>EAE Mission Control</title>
<style>
:root{
  --bg:#070b16;
  --bg-2:#0b1122;
  --card:#0e1526;
  --card-2:#121a2f;
  --line:#1c2740;
  --line-2:#263353;
  --text:#e8ecf4;
  --muted:#8b96ad;
  --faint:#5b6680;
  --red:#e4002b;
  --red-soft:rgba(228,0,43,.12);
  --cyan:#59c2e8;
  --cyan-soft:rgba(89,194,232,.10);
  --green:#3ecf8e;
  --green-soft:rgba(62,207,142,.12);
  --amber:#f0b429;
  --amber-soft:rgba(240,180,41,.12);
  --radius:14px;
  --nav-h:64px;
  --sidebar-w:236px;
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:var(--text)}
textarea{resize:vertical}
a{color:var(--cyan);text-decoration:none}
::selection{background:rgba(89,194,232,.25)}

/* ---------- layout ---------- */
#app{display:flex;min-height:100vh}
#sidebar{
  width:var(--sidebar-w);
  background:var(--bg-2);
  border-right:1px solid var(--line);
  position:fixed;inset:0 auto 0 0;
  padding:24px 14px;
  display:none;
  flex-direction:column;gap:2px;
  z-index:40;
  overflow-y:auto;
}
#sidebar .brand{padding:0 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
#sidebar .brand h1{font-size:.95rem;letter-spacing:.14em;font-weight:700}
#sidebar .brand h1 .red{color:var(--red)}
#sidebar .brand p{font-size:.68rem;color:var(--muted);letter-spacing:.06em;margin-top:3px}
.navbtn{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:10px;
  color:var(--muted);font-size:.88rem;font-weight:500;
  width:100%;text-align:left;
  transition:background .15s,color .15s;
}
.navbtn svg{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.navbtn:hover{background:var(--card);color:var(--text)}
.navbtn.active{background:var(--card-2);color:var(--text)}
.navbtn.active svg{color:var(--red)}
#sidebar .sb-count{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--line);font-size:.72rem;color:var(--faint);letter-spacing:.05em}
#sidebar .sb-count b{color:var(--text);font-variant-numeric:tabular-nums}

#main{
  flex:1;min-width:0;
  padding:20px 16px calc(var(--nav-h) + 34px);
  max-width:960px;margin:0 auto;
  animation:fadein .28s ease;
}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

#bottomnav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(9,14,27,.92);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
  display:flex;
}
#bottomnav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--faint);font-size:.62rem;letter-spacing:.04em;font-weight:600;
}
#bottomnav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#bottomnav button.active{color:var(--text)}
#bottomnav button.active svg{color:var(--red)}

@media(min-width:900px){
  #sidebar{display:flex}
  #bottomnav{display:none}
  #main{margin-left:var(--sidebar-w);padding:36px 40px 60px;max-width:calc(var(--sidebar-w) + 980px)}
}

/* ---------- shared components ---------- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
}
.card h3{font-size:.78rem;letter-spacing:.14em;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:12px}
.pagehead{margin-bottom:18px}
.pagehead h2{font-size:1.35rem;font-weight:700;letter-spacing:-.01em}
.pagehead p{color:var(--muted);font-size:.85rem;margin-top:2px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:10px;
  font-size:.86rem;font-weight:600;
  background:var(--card-2);border:1px solid var(--line-2);
  transition:transform .12s,background .15s,border-color .15s;
  min-height:44px;
}
.btn:hover{border-color:var(--faint)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.btn.primary:hover{background:#c50026;border-color:#c50026}
.btn.ghost{background:transparent}
.btn.small{padding:7px 12px;min-height:36px;font-size:.78rem;border-radius:8px}
.btn.full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
.pill{
  display:inline-block;padding:3px 10px;border-radius:99px;
  font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
}
.pill.red{background:var(--red-soft);color:#ff6b8a}
.pill.orange{background:var(--amber-soft);color:var(--amber)}
.pill.yellow{background:rgba(240,220,100,.1);color:#e8d96a}
.pill.cyan{background:var(--cyan-soft);color:var(--cyan)}
.pill.green{background:var(--green-soft);color:var(--green)}
.pill.grey{background:rgba(139,150,173,.12);color:var(--muted)}
.tagrow{display:flex;flex-wrap:wrap;gap:6px}

.progressbar{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.progressbar > div{height:100%;background:var(--cyan);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progressbar.red > div{background:var(--red)}
.progressbar.green > div{background:var(--green)}

.check{
  display:flex;align-items:flex-start;gap:11px;
  padding:9px 4px;cursor:pointer;border-radius:8px;
  font-size:.9rem;color:var(--text);
  transition:background .12s;
  user-select:none;-webkit-user-select:none;
}
.check:hover{background:rgba(255,255,255,.02)}
.check .box{
  width:21px;height:21px;flex:none;margin-top:1px;
  border:1.6px solid var(--line-2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.check .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.5);transition:opacity .15s,transform .15s}
.check.on .box{background:var(--red);border-color:var(--red)}
.check.on .box svg{opacity:1;transform:scale(1)}
.check.on span.lbl{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}

textarea.field,input.field{
  width:100%;background:var(--bg-2);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;font-size:.88rem;
  color:var(--text);outline:none;transition:border-color .15s;
}
textarea.field:focus,input.field:focus{border-color:var(--cyan)}
textarea.field::placeholder,input.field::placeholder{color:var(--faint)}
label.fieldlabel{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:14px 0 6px}

details.acc{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin-bottom:12px;overflow:hidden}
details.acc > summary{
  list-style:none;cursor:pointer;padding:16px 18px;
  display:flex;align-items:center;gap:12px;
  font-weight:600;font-size:.92rem;
}
details.acc > summary::-webkit-details-marker{display:none}
details.acc > summary .chev{margin-left:auto;flex:none;transition:transform .2s;color:var(--faint)}
details.acc[open] > summary .chev{transform:rotate(90deg)}
details.acc .acc-body{padding:0 18px 18px;border-top:1px solid var(--line);padding-top:14px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:560px){.grid3{grid-template-columns:1fr 1fr}}

.stat{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;
}
.stat .v{font-size:1.45rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.stat .k{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-top:2px}

.divider{height:1px;background:var(--line);margin:16px 0}
.hint{font-size:.78rem;color:var(--faint);line-height:1.5}
.warn-msg{background:var(--amber-soft);border:1px solid rgba(240,180,41,.3);color:var(--amber);padding:10px 14px;border-radius:10px;font-size:.82rem;margin-top:10px}
.motto{
  text-align:center;color:var(--muted);font-size:.85rem;font-style:italic;
  padding:14px 0 4px;letter-spacing:.02em;
}

/* ---------- countdown ---------- */
.hero{
  background:linear-gradient(160deg,#0d1428 0%,#0a0f1f 60%,#0d1226 100%);
  border:1px solid var(--line);border-radius:18px;
  padding:26px 20px 22px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(600px 200px at 85% -20%,rgba(89,194,232,.09),transparent 65%),
             radial-gradient(500px 220px at 5% 120%,rgba(228,0,43,.08),transparent 60%);
  pointer-events:none;
}
.hero > *{position:relative}
.hero .kicker{font-size:.66rem;letter-spacing:.28em;color:var(--red);font-weight:700;text-transform:uppercase}
.hero h2{font-size:1.6rem;font-weight:800;letter-spacing:.02em;margin-top:6px}
.hero .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
.hero .when{margin-top:10px;font-size:.82rem;color:var(--cyan);font-weight:600;letter-spacing:.04em}
.countdown{display:flex;gap:10px;margin-top:18px}
.countdown .unit{
  flex:1;text-align:center;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:12px;padding:12px 4px 10px;
}
.countdown .unit .n{font-size:1.7rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.countdown .unit .u{font-size:.6rem;letter-spacing:.16em;color:var(--muted);font-weight:700;margin-top:1px}
.mission-time{
  margin-top:18px;text-align:center;font-size:1.15rem;font-weight:800;
  letter-spacing:.12em;color:var(--green);
}

/* readiness ring */
.readiness{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ring{position:relative;width:118px;height:118px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .track{stroke:var(--line);fill:none;stroke-width:9}
.ring .fill{stroke:var(--red);fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ring .ring-label{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring .ring-label .pct{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums}
.ring .ring-label .cap{font-size:.55rem;letter-spacing:.1em;color:var(--muted);font-weight:700}
.rank-badge{font-size:.72rem;letter-spacing:.18em;font-weight:800;color:var(--cyan);text-transform:uppercase}

/* mock mode */
#mockoverlay{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:none;flex-direction:column;
  padding:calc(14px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
  overflow-y:auto;
}
#mockoverlay.open{display:flex;animation:fadein .25s ease}
.mock-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mock-q{
  font-size:1.35rem;font-weight:700;line-height:1.35;letter-spacing:-.01em;
  margin:14px 0 6px;
}
@media(min-width:700px){.mock-q{font-size:1.7rem}}
.mock-timer{
  font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;
  text-align:center;padding:8px 0;
}
.mock-timer.over{color:var(--amber)}
.mock-timer.prep{color:var(--cyan)}
.score-steps{display:flex;gap:6px}
.score-steps button{
  flex:1;min-height:42px;border-radius:9px;border:1px solid var(--line-2);
  background:var(--card);font-weight:700;font-size:.9rem;color:var(--muted);
}
.score-steps button.sel{background:var(--red);border-color:var(--red);color:#fff}
.scorerow{margin-bottom:12px}
.scorerow .sk{font-size:.7rem;letter-spacing:.12em;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between}

/* modal */
#modal-back{
  position:fixed;inset:0;z-index:120;background:rgba(4,7,14,.7);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:22px;
}
#modal-back.open{display:flex;animation:fadein .2s ease}
#modal{
  background:var(--card-2);border:1px solid var(--line-2);border-radius:16px;
  max-width:420px;width:100%;padding:22px;
}
#modal h4{font-size:1.05rem;font-weight:700;margin-bottom:8px}
#modal p{color:var(--muted);font-size:.88rem;margin-bottom:18px}
#modal .row{display:flex;gap:10px;justify-content:flex-end}

/* toast */
#toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 20px);transform:translateX(-50%) translateY(20px);
  background:var(--card-2);border:1px solid var(--line-2);color:var(--text);
  padding:11px 20px;border-radius:99px;font-size:.84rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:130;
  white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:900px){#toast{bottom:28px}}

/* framework arrows */
.framework-steps{display:flex;flex-direction:column;gap:0}
.fstep{padding:12px 14px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px}
.fstep b{color:var(--red);font-size:.75rem;letter-spacing:.16em}
.fstep p{font-size:.86rem;color:var(--muted);margin-top:2px}
.farrow{text-align:center;color:var(--faint);font-size:.9rem;padding:2px 0}

/* memory triggers chain */
.trigchain{display:flex;flex-direction:column;align-items:center;gap:0;padding:6px 0}
.trigchain .t{
  background:var(--bg-2);border:1px solid var(--line);border-radius:8px;
  padding:6px 16px;font-size:.78rem;font-weight:700;letter-spacing:.12em;
}
.trigchain .a{color:var(--faint);font-size:.8rem;line-height:1.4}

/* achievements */
.ach{display:flex;gap:13px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.ach:last-child{border-bottom:none}
.ach .medal{
  width:38px;height:38px;flex:none;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-2);border:1px solid var(--line);color:var(--faint);
}
.ach.unlocked .medal{background:var(--green-soft);border-color:rgba(62,207,142,.35);color:var(--green)}
.ach .t1{font-size:.86rem;font-weight:700}
.ach .t2{font-size:.75rem;color:var(--muted)}
.ach.unlocked .t1{color:var(--text)}
.ach:not(.unlocked) .t1{color:var(--muted)}
.ach .medal svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.bigquote{
  text-align:center;font-size:1.05rem;font-weight:700;line-height:1.7;
  padding:26px 18px;letter-spacing:.03em;
}
.stopstudy{
  background:var(--red);color:#fff;border-radius:var(--radius);
  text-align:center;padding:26px 18px;margin-bottom:14px;
  font-weight:800;letter-spacing:.2em;font-size:1.3rem;
}
.qmeta{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.qmeta b{color:var(--cyan);font-weight:600}
ul.kp{margin:0 0 4px 18px;font-size:.87rem;color:var(--text)}
ul.kp li{margin-bottom:4px}
.model-box{
  background:var(--bg-2);border:1px solid var(--line);border-radius:10px;
  padding:14px;font-size:.86rem;line-height:1.7;color:#c8d0e0;white-space:pre-line;
}
.donotmemo{
  display:inline-block;background:var(--red-soft);color:#ff6b8a;
  font-size:.64rem;font-weight:800;letter-spacing:.14em;
  padding:4px 10px;border-radius:6px;margin-bottom:8px;
}
.counter-btn{display:flex;align-items:center;gap:12px}
.counter-btn .n{font-size:1.1rem;font-weight:800;font-variant-numeric:tabular-nums;min-width:34px;text-align:center}
.conf-dots{display:flex;gap:7px}
.conf-dots button{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line-2);
  background:var(--card);color:var(--muted);font-weight:700;font-size:.8rem;
}
.conf-dots button.sel{background:var(--cyan);border-color:var(--cyan);color:#04121c}
.day-date{font-size:.7rem;color:var(--faint);letter-spacing:.08em;font-weight:600}
.today-tag{background:var(--red);color:#fff;font-size:.6rem;font-weight:800;letter-spacing:.1em;padding:3px 8px;border-radius:5px}
.done-tag{background:var(--green-soft);color:var(--green);font-size:.6rem;font-weight:800;letter-spacing:.1em;padding:3px 8px;border-radius:5px}
.taskhead{display:flex;align-items:baseline;justify-content:space-between;margin:16px 0 4px}
.taskhead h5{font-size:.8rem;letter-spacing:.1em;font-weight:800;color:var(--cyan);text-transform:uppercase}
.taskhead span{font-size:.7rem;color:var(--faint);font-weight:600}
.mock-hist{padding:12px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.mock-hist:last-child{border:none}
.rec-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
audio{width:100%;margin-top:8px;height:38px}
.sheet-menu{position:fixed;inset:auto 0 0 0;z-index:110;background:var(--card-2);
  border-top:1px solid var(--line-2);border-radius:18px 18px 0 0;
  padding:14px 14px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.sheet-menu.open{transform:none}
#sheet-back{position:fixed;inset:0;z-index:105;background:rgba(4,7,14,.55);display:none}
#sheet-back.open{display:block}
.sheet-menu .grab{width:38px;height:4px;border-radius:99px;background:var(--line-2);margin:0 auto 12px}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main"></main>
  <nav id="bottomnav"></nav>
</div>

<div id="mockoverlay"></div>
<div id="sheet-back"></div>
<div class="sheet-menu" id="sheet"></div>
<div id="modal-back"><div id="modal"></div></div>
<div id="toast"></div>

<script>
"use strict";
/* ================= DATA ================= */

const INTERVIEW_TS = Date.UTC(2026, 6, 29, 8, 0, 0); // 29 Jul 2026, 16:00 SGT (UTC+8)
const STOP_STUDY_TS = Date.UTC(2026, 6, 29, 7, 30, 0); // 15:30 SGT
const LS_KEY = "eaeMissionControl.v1";

const FRAMEWORK = [
  { k: "POINT", d: "Directly answer the question." },
  { k: "PROOF", d: "Give specific evidence from something I actually did." },
  { k: "LESSON", d: "Explain what I learned or how I developed." },
  { k: "LINK", d: "Connect it back to Aerospace Electronics, Singapore Polytechnic, engineering, or my future." }
];
const FRAMEWORK_EXAMPLE = [
  { k: "POINT", d: "“I’m persistent when solving problems.”" },
  { k: "PROOF", d: "“During SAFMC, our aircraft experienced stability and structural problems.”" },
  { k: "LESSON", d: "“I learnt to troubleshoot systematically, test changes and learn from failed designs.”" },
  { k: "LINK", d: "“That problem-solving process strengthened my interest in engineering and is something I want to develop further through DASE.”" }
];

/* ---------- 7-day plan ---------- */
const DAYS = [
  {
    id: "thu", date: "2026-07-23", name: "Thursday", title: "Build the Foundation", target: 90,
    objective: "Build the foundation of my interview identity and stop relying on scripts.",
    success: "I should be able to answer all three without memorising exact sentences while keeping the same core ideas.",
    tasks: [
      { id: "t1", title: "Task 1 — Personal fact sheet", mins: 30,
        intro: "Create/review my one-page personal fact sheet. I must know bullet points for:",
        items: ["SAFMC 2026","GE Aerospace Electrical Engineering Job Simulation","Basic Flight Mechanics course","NPCC — Staff Sergeant / cadet leadership","Class chairperson","SP AeroHub / SP visit","Singapore Airshow 2026","My aviation interest","My long-term career aspiration","My strongest personal qualities"] },
      { id: "t2", title: "Task 2 — Master the structures", mins: 30,
        intro: "Master the structure of:",
        items: ["Tell me about yourself","Why Aerospace Electronics?","Why Singapore Polytechnic?"] },

let S;
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    S = raw ? Object.assign(DEFAULT_STATE(), JSON.parse(raw)) : DEFAULT_STATE();
    S.settings = Object.assign({ hideModels: false }, S.settings);
  } catch (e) { S = DEFAULT_STATE(); }
}
let saveT = null;
function save() {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch (e) {}
  }, 120);
}
function qState(id) {
  if (!S.q[id]) S.q[id] = { notes: "", practice: 0, confidence: 0, withNotes: false, withoutNotes: false, followups: false, mastered: false };
  return S.q[id];
}

/* ================= TIME / SGT ================= */

const sgtDateFmt = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Singapore", year: "numeric", month: "2-digit", day: "2-digit" });
function sgtToday() { return sgtDateFmt.format(new Date()); } // YYYY-MM-DD
function logActivity() {
  const d = sgtToday();
  if (!S.activity[d]) { S.activity[d] = true; save(); }
}
function streak() {
  let n = 0;
  let d = new Date();
  // walk back day by day in SGT
  for (let i = 0; i < 400; i++) {
    const key = sgtDateFmt.format(d);
    if (S.activity[key]) { n++; d = new Date(d.getTime() - 86400000); }
    else if (i === 0) { d = new Date(d.getTime() - 86400000); } // today may not have activity yet — check yesterday
    else break;
  }
  return n;
}
function todaysDay() {
  const t = sgtToday();
  return DAYS.find(d => d.date === t) || null;
}
function isInterviewDay() { return sgtToday() === "2026-07-29"; }
function pastStopStudy() { return Date.now() >= STOP_STUDY_TS && Date.now() < INTERVIEW_TS + 6 * 3600000; }
function missionArrived() { return Date.now() >= INTERVIEW_TS; }

/* ================= PROGRESS ================= */

function dayItemIds(day) {
  const ids = [];
  day.tasks.forEach(t => t.items.forEach((_, i) => ids.push(`day.${day.id}.${t.id}.${i}`)));
  return ids;
}
function dayProgress(day) {
  const ids = dayItemIds(day);
  const done = ids.filter(id => S.checks[id]).length;
  return { done, total: ids.length, pct: ids.length ? Math.round(done / ids.length * 100) : 0 };
}
function counts() {
  const daysDone = DAYS.filter(d => S.daysCompleted[d.id]).length;
  const mastered = QUESTIONS.filter(q => qState(q.id).mastered).length;
  const storiesReady = STORIES.filter(st => storyState(st.id).ready).length;
  const mocksDone = S.mocks.length;
  const practiceTotal = QUESTIONS.reduce((a, q) => a + qState(q.id).practice, 0);
  return { daysDone, mastered, storiesReady, mocksDone, practiceTotal };
}
function readiness() {
  const c = counts();
  const mockConf = S.mocks.length
    ? S.mocks.reduce((a, m) => a + mockAvg(m), 0) / S.mocks.length / 5
    : 0;
  const pct =
    (c.daysDone / 7) * 25 +
    (c.mastered / 17) * 30 +
    (c.storiesReady / 4) * 20 +
    Math.min(c.mocksDone, 2) / 2 * 10 + mockConf * 5 +
    Math.min(c.practiceTotal, 51) / 51 * 10;
  return Math.min(100, Math.round(pct));
}
function mockAvg(m) {
  const scored = m.results.filter(r => !r.skipped && r.scores);
  if (!scored.length) return 0;
  let s = 0, n = 0;
  scored.forEach(r => SCORE_KEYS.forEach(k => { if (r.scores[k.id]) { s += r.scores[k.id]; n++; } }));
  return n ? s / n : 0;
}
function rankFor(pct) {
  return (RANKS.find(r => pct >= r.min && pct <= r.max) || RANKS[0]).name;
}
function achievementUnlocked(id) {
  const c = counts();
  switch (id) {
    case "firstFlight": return c.practiceTotal >= 1 || c.mocksDone >= 1;
    case "noScript": return !!qState("q1").withoutNotes;
    case "avionicsReady": return DASE_QIDS.every(q => qState(q).mastered);
    case "pressureTested": return S.mocks.some(m => m.mode === "pressure");
    case "fullSystems": return c.storiesReady === 4;
    case "missionReady": return readiness() >= 90;
    default: return false;
  }
}

/* checkbox binding: any element .check[data-key] toggles S.checks[key] */
function checkHtml(key, label, extraClass) {
  const on = !!S.checks[key];
  return `<div class="check ${on ? "on" : ""} ${extraClass || ""}" data-key="${esc(key)}" role="checkbox" aria-checked="${on}" tabindex="0">
    <div class="box">${ICONS.tick}</div><span class="lbl">${esc(label)}</span>
  </div>`;
}
document.addEventListener("click", e => {
  const c = e.target.closest(".check[data-key]");
  if (!c) return;
  const key = c.dataset.key;
  S.checks[key] = !S.checks[key];
  if (!S.checks[key]) delete S.checks[key];
  c.classList.toggle("on", !!S.checks[key]);
  c.setAttribute("aria-checked", !!S.checks[key]);
  logActivity();
  save();
  if (c.dataset.rerender) render();
  else refreshDynamicBits();
});
document.addEventListener("keydown", e => {
  if ((e.key === " " || e.key === "Enter") && e.target.classList && e.target.classList.contains("check")) {
    e.preventDefault(); e.target.click();
  }
});

/* refresh progress bars / counters on current page without full re-render */
function refreshDynamicBits() {
  document.querySelectorAll("[data-dayprog]").forEach(el => {
    const day = DAYS.find(d => d.id === el.dataset.dayprog);
    if (!day) return;
    const p = dayProgress(day);
    const bar = el.querySelector(".progressbar > div");
    if (bar) bar.style.width = p.pct + "%";
    const lbl = el.querySelector("[data-dayprog-label]");
    if (lbl) lbl.textContent = `${p.done}/${p.total} tasks`;
  });
}

let cdTimer = null;
function startCountdown() {
  clearInterval(cdTimer);
  const tick = () => {
    const el = $("#countdown");
    if (!el) { clearInterval(cdTimer); return; }
    let diff = INTERVIEW_TS - Date.now();
    if (diff <= 0) { render(); return; }
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000); diff -= h * 3600000;
    const m = Math.floor(diff / 60000); diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    const set = (u, v) => { const n = el.querySelector(`[data-cd="${u}"]`); if (n) n.textContent = String(v).padStart(2, "0"); };
    set("DAYS", d); set("HOURS", h); set("MINUTES", m); set("SECONDS", s);
  };
  tick();
  cdTimer = setInterval(tick, 1000);
}

  if (wrap) [...wrap.children].forEach((b, i) => b.classList.toggle("sel", i + 1 === st.confidence));

      return `<div class="mock-hist">
        <div style="display:flex;justify-content:space-between;gap:8px">
          <b>${(MOCK_MODES.find(x => x.id === m.mode) || {}).name || m.mode}</b>
          <span style="color:${avg >= 4 ? "var(--green)" : avg >= 3 ? "var(--amber)" : "#ff6b8a"};font-weight:700">${avg ? avg.toFixed(1) : "–"}/5</span>
        </div>
        <div class="hint">${d} · ${m.results.filter(r => !r.skipped).length} answered</div>
      </div>`;
    }).join("") : '<p class="hint">No mocks yet. Your first one is the hardest — start it.</p>'}
  </div>`;
}

/* ----- session state ----- */
let MK = null; // {mode, queue:[], i, phase, results:[], timer stuff}
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }
function coreToMockQ(q, targetOverride) {
  return { text: q.q, qid: q.id, target: targetOverride || q.target || [45, 90], followUps: (q.followUps && q.followUps.length) ? q.followUps : GENERIC_FOLLOWUPS };
}
function pressureToMockQ(t, targetOverride) {
  const target = /30 seconds/.test(t) ? [20, 35] : (targetOverride || [45, 90]);
  return { text: t, qid: null, target, followUps: GENERIC_FOLLOWUPS };
}
function buildQueue(mode) {
  if (mode === "standard") {
    const red = shuffle(QUESTIONS.filter(q => q.tier === "red")).map(q => coreToMockQ(q));
    const rest = shuffle(QUESTIONS.filter(q => q.tier !== "red")).slice(0, 3).map(q => coreToMockQ(q));
    const group = pressureToMockQ("What would you contribute to your classmates?");
    return red.concat(rest, [group]).slice(0, 10);
  }
  if (mode === "pressure") return shuffle(PRESSURE_QUESTIONS).slice(0, 10).map(t => pressureToMockQ(t));
  if (mode === "quickfire") return shuffle(QUESTIONS).slice(0, 7).map(q => coreToMockQ(q, [30, 60]));
  // random
  const mix = shuffle(QUESTIONS.map(q => coreToMockQ(q)).concat(PRESSURE_QUESTIONS.map(t => pressureToMockQ(t))));
  return mix.slice(0, 8);
}

function startMock(mode) {
  MK = {
    mode, queue: buildQueue(mode), i: 0, results: [],
    phase: "brief", prepOn: true,
    t: 0, running: false, int: null,
    followIdx: 0, rec: null, recURL: null, chunks: []
  };
  $("#mockoverlay").classList.add("open");
  renderMock();
}
function mockCleanupTimers() { if (MK && MK.int) { clearInterval(MK.int); MK.int = null; } }
function exitMock(force) {
  const doExit = () => {
    mockCleanupTimers(); stopRecCleanup();
    MK = null;
    $("#mockoverlay").classList.remove("open");
    render();
  };
  if (!force && MK && MK.phase === "done") { doExit(); return; }
  if (!force && MK && MK.results.some(r => !r.skipped)) {
    confirmModal("End mock interview?", "Progress so far will be saved as a completed mock.", "Save & exit", () => { finishMock(); }, false);
  } else if (!force && MK && MK.phase !== "brief" && MK.phase !== "done") {
    confirmModal("Abandon mock?", "Nothing answered yet — this mock will not be saved.", "Abandon", doExit, true);
  } else doExit();
}

function fmtT(s) { return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }

function renderMock() {
  if (!MK) return;
  const o = $("#mockoverlay");
  const modeName = (MOCK_MODES.find(m => m.id === MK.mode) || {}).name || "Mock";
  const top = `<div class="mock-top">
    <span class="pill ${MK.mode === "pressure" ? "red" : "cyan"}">${modeName.toUpperCase()}</span>
    <span style="font-size:.78rem;color:var(--faint);font-weight:600">${MK.phase === "done" ? "" : `Q ${Math.min(MK.i + 1, MK.queue.length)} / ${MK.queue.length}`}</span>
    <button class="btn small ghost" onclick="exitMock()">Exit</button>
  </div>`;

  if (MK.phase === "brief") {
    o.innerHTML = top + `
      <div style="max-width:560px;margin:6vh auto 0;width:100%">
        <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:6px">${modeName}</h2>
        <p class="hint" style="margin-bottom:18px">${MK.queue.length} questions. Sit properly. No notes. Answer aloud — actually speak.</p>
        <div class="check ${MK.prepOn ? "on" : ""}" id="prep-toggle" onclick="MK.prepOn=!MK.prepOn;this.classList.toggle('on',MK.prepOn)">
          <div class="box">${ICONS.tick}</div><span class="lbl">10-second preparation timer before each answer</span>
        </div>
        <button class="btn primary full" style="margin-top:20px" onclick="mockBegin()">Begin</button>
      </div>`;
    return;
  }

  if (MK.phase === "done") { renderMockSummary(); return; }

  const q = MK.queue[MK.i];
  const [lo, hi] = q.target;

  if (MK.phase === "prep") {
    o.innerHTML = top + `
      <div style="max-width:640px;margin:4vh auto 0;width:100%;text-align:center">
        <div class="hint" style="letter-spacing:.2em;font-weight:800">PREPARE</div>
        <div class="mock-q" style="text-align:center">${esc(q.text)}</div>
        <div class="mock-timer prep" id="mock-timer">${MK.t}</div>
        <button class="btn primary" onclick="mockStartAnswer()">Answer now</button>
      </div>`;
    return;
  }

  if (MK.phase === "answer") {
    o.innerHTML = top + `
      <div style="max-width:640px;margin:2vh auto 0;width:100%">
        <div class="mock-q">${esc(q.text)}</div>
        <div class="hint" style="text-align:center">target ${lo}–${hi} s</div>
        <div class="mock-timer ${MK.t > hi ? "over" : ""}" id="mock-timer">${fmtT(MK.t)}</div>
        <div id="followup-box"></div>
        <div style="display:flex;gap:10px;margin-top:14px">
          <button class="btn" style="flex:1" id="pausebtn" onclick="mockPause()">${MK.running ? "Pause" : "Resume"}</button>
          <button class="btn" style="flex:1" onclick="mockShowFollowUp()">Show Follow-Up</button>
        </div>
        <button class="btn primary full" style="margin-top:10px" onclick="mockStopAndScore()">Stop & Score</button>
        <div class="rec-row" id="rec-row"></div>
        <button class="btn ghost full small" style="margin-top:14px;color:var(--faint)" onclick="mockSkip()">Skip this question</button>
      </div>`;
    renderRecRow();
    return;
  }

  if (MK.phase === "score") {
    const res = MK.results[MK.results.length - 1];
    o.innerHTML = top + `
      <div style="max-width:640px;margin:1vh auto 0;width:100%">
        <div class="hint" style="letter-spacing:.16em;font-weight:800">SELF-SCORE</div>
        <div class="mock-q" style="font-size:1.05rem">${esc(q.text)}</div>
        <div class="hint" style="margin-bottom:14px">You spoke for ${fmtT(res.secs)} (target ${lo}–${hi} s).</div>
        ${SCORE_KEYS.map(k => `
          <div class="scorerow">
            <div class="sk"><span>${k.label}</span><span>/ 5</span></div>
            <div class="score-steps" data-scorekey="${k.id}">
              ${[1,2,3,4,5].map(n => `<button onclick="mockSetScore('${k.id}',${n},this)">${n}</button>`).join("")}
            </div>
          </div>`).join("")}
        <label class="fieldlabel">What went well?</label>
        <textarea class="field" rows="2" id="mk-well"></textarea>
        <label class="fieldlabel">What needs improvement?</label>
        <textarea class="field" rows="2" id="mk-improve"></textarea>
        <div class="rec-row" id="rec-row"></div>
        <button class="btn primary full" style="margin-top:16px" onclick="mockNext()">${MK.i + 1 >= MK.queue.length ? "Finish Mock" : "Next Question"}</button>
      </div>`;
    renderRecRow(true);
    return;
  }
}

function mockBegin() {
  MK.i = 0; mockLoadQuestion();
}
function mockLoadQuestion() {
  mockCleanupTimers(); stopRecCleanup();
  MK.followIdx = 0;
  if (MK.prepOn) {
    MK.phase = "prep"; MK.t = 10;
    renderMock();
    MK.int = setInterval(() => {
      MK.t--;
      const el = document.getElementById("mock-timer");
      if (el) el.textContent = MK.t;
      if (MK.t <= 0) mockStartAnswer();
    }, 1000);
  } else mockStartAnswer();
}
function mockStartAnswer() {
  mockCleanupTimers();
  MK.phase = "answer"; MK.t = 0; MK.running = true;
  renderMock();
  MK.int = setInterval(() => {
    if (!MK.running) return;
    MK.t++;
    const el = document.getElementById("mock-timer");
    if (el) {
      el.textContent = fmtT(MK.t);
      el.classList.toggle("over", MK.t > MK.queue[MK.i].target[1]);
    }
  }, 1000);
}
function mockPause() {
  MK.running = !MK.running;
  const b = document.getElementById("pausebtn");
  if (b) b.textContent = MK.running ? "Pause" : "Resume";
}
function mockShowFollowUp() {
  const q = MK.queue[MK.i];
  const list = q.followUps.length ? q.followUps : GENERIC_FOLLOWUPS;
  const f = list[MK.followIdx % list.length];
  MK.followIdx++;
  const box = document.getElementById("followup-box");
  if (box) box.innerHTML = `<div class="warn-msg" style="border-color:rgba(89,194,232,.35);background:var(--cyan-soft);color:var(--cyan)"><b>Follow-up:</b> ${esc(f)}</div>`;
}
function mockSkip() {
  mockCleanupTimers(); stopRecCleanup();
  MK.results.push({ q: MK.queue[MK.i].text, qid: MK.queue[MK.i].qid, skipped: true });
  mockAdvance();
}
function mockStopAndScore() {
  mockCleanupTimers();
  stopRecordingIfActive();
  MK.results.push({ q: MK.queue[MK.i].text, qid: MK.queue[MK.i].qid, secs: MK.t, scores: {}, well: "", improve: "" });
  MK.phase = "score";
  renderMock();
}
function mockSetScore(key, n, btn) {
  const res = MK.results[MK.results.length - 1];
  res.scores[key] = n;
  const row = btn.parentElement;
  [...row.children].forEach((b, i) => b.classList.toggle("sel", i + 1 === n));
}
function mockNext() {
  const res = MK.results[MK.results.length - 1];
  const missing = SCORE_KEYS.filter(k => !res.scores[k.id]);
  const wellEl = document.getElementById("mk-well"), impEl = document.getElementById("mk-improve");
  if (wellEl) res.well = wellEl.value;
  if (impEl) res.improve = impEl.value;
  const go = () => {
    if (res.qid) { qState(res.qid).practice++; }
    mockAdvance();
  };
  if (missing.length) {
    confirmModal("Unscored categories", `You haven’t scored: ${missing.map(k => k.label).join(", ")}. Continue anyway?`, "Continue", go, false);
  } else go();
}
function mockAdvance() {
  stopRecCleanup();
  MK.i++;
  if (MK.i >= MK.queue.length) finishMock();
  else mockLoadQuestion();
}
function finishMock() {
  if (!MK || MK.phase === "done") return;
  mockCleanupTimers(); stopRecCleanup();
  const answered = MK.results.filter(r => !r.skipped);
  if (answered.length) {
    S.mocks.push({ ts: Date.now(), mode: MK.mode, results: MK.results });
    logActivity(); save();
  }
  MK.phase = "done";
  renderMock();
  renderNav();
}
function renderMockSummary() {
  const o = $("#mockoverlay");
  const answered = MK.results.filter(r => !r.skipped && r.scores);
  if (!answered.length) {
    o.innerHTML = `<div class="mock-top"><span></span><button class="btn small ghost" onclick="exitMock(true)">Close</button></div>
      <div style="max-width:560px;margin:10vh auto 0;text-align:center">
        <h2 style="font-weight:800">Mock abandoned</h2>
        <p class="hint" style="margin-top:8px">No answers were scored, so nothing was saved.</p>
        <button class="btn primary" style="margin-top:20px" onclick="exitMock(true)">Back to Mission Control</button>
      </div>`;
    return;
  }
  const catAvg = {};
  SCORE_KEYS.forEach(k => {
    const vals = answered.map(r => r.scores[k.id]).filter(Boolean);
    catAvg[k.id] = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  });
  const sorted = SCORE_KEYS.slice().sort((a, b) => catAvg[b.id] - catAvg[a.id]);
  const strongest = sorted[0], weakest = sorted[sorted.length - 1];
  const overall = mockAvg({ results: MK.results });
  const weakQs = answered
    .map(r => ({ r, avg: SCORE_KEYS.reduce((a, k) => a + (r.scores[k.id] || 0), 0) / SCORE_KEYS.filter(k => r.scores[k.id]).length }))
    .filter(x => x.avg && x.avg <= 3);
  o.innerHTML = `
    <div class="mock-top"><span class="pill green">COMPLETE</span><span></span><button class="btn small ghost" onclick="exitMock(true)">Close</button></div>
    <div style="max-width:600px;margin:2vh auto 0;width:100%">
      <h2 style="font-weight:800;font-size:1.4rem">Mock debrief</h2>
      <div class="grid2" style="margin-top:14px">
        <div class="stat"><div class="v">${overall.toFixed(1)}/5</div><div class="k">Mock Score</div></div>
        <div class="stat"><div class="v">${answered.length}</div><div class="k">Answered</div></div>
        <div class="stat"><div class="v" style="color:var(--green);font-size:1rem">${strongest.label}</div><div class="k">Strongest Area (${catAvg[strongest.id].toFixed(1)})</div></div>
        <div class="stat"><div class="v" style="color:#ff6b8a;font-size:1rem">${weakest.label}</div><div class="k">Weakest Area (${catAvg[weakest.id].toFixed(1)})</div></div>
      </div>
      <div class="card" style="margin-top:14px">
        <h3>Questions needing more practice</h3>
        ${weakQs.length
          ? weakQs.map(x => `<p style="font-size:.87rem;padding:7px 0;border-bottom:1px solid var(--line)">${esc(x.r.q)} <span style="color:#ff6b8a;font-weight:700;float:right">${x.avg.toFixed(1)}</span></p>`).join("")
          : '<p class="hint">Nothing scored 3 or below. Strong run.</p>'}
      </div>
      <button class="btn primary full" onclick="exitMock(true)">Back to Mission Control</button>
      <div class="motto">Score honestly — flattering yourself here costs you on Wednesday.</div>
    </div>`;
}

/* ----- optional microphone recording ----- */
const RECORDING_SUPPORTED = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
function renderRecRow(playbackMode) {
  const row = document.getElementById("rec-row");
  if (!row || !RECORDING_SUPPORTED) return;
  if (MK.recURL) {
    row.innerHTML = `
      <button class="btn small" onclick="deleteRecording()">Delete recording</button>
      <span class="hint">recorded — listen back:</span>
      <audio controls src="${MK.recURL}"></audio>`;
  } else if (MK.rec) {
    row.innerHTML = `<button class="btn small" style="border-color:var(--red);color:#ff6b8a" onclick="stopRecordingIfActive(true)">■ Stop recording</button><span class="hint">recording…</span>`;
  } else if (!playbackMode) {
    row.innerHTML = `<button class="btn small" onclick="startRecording()">● Record answer</button><span class="hint">optional</span>`;
  } else {
    row.innerHTML = "";
  }
}
function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    if (!MK) { stream.getTracks().forEach(t => t.stop()); return; }
    MK.chunks = [];
    MK.rec = new MediaRecorder(stream);
    MK.rec.ondataavailable = e => { if (e.data.size) MK.chunks.push(e.data); };
    MK.rec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (MK && MK.chunks.length) {
        MK.recURL = URL.createObjectURL(new Blob(MK.chunks, { type: MK.rec.mimeType || "audio/webm" }));
      }
      if (MK) { MK.rec = null; renderRecRow(MK.phase === "score"); }
    };
    MK.rec.start();
    renderRecRow();
  }).catch(() => toast("Microphone unavailable — recording is optional"));
}
function stopRecordingIfActive(rerender) {
  if (MK && MK.rec && MK.rec.state !== "inactive") MK.rec.stop();
  else if (rerender) renderRecRow();
}
function deleteRecording() {
  if (MK && MK.recURL) { URL.revokeObjectURL(MK.recURL); MK.recURL = null; }
  renderRecRow(MK && MK.phase === "score");
}
function stopRecCleanup() {
  if (!MK) return;
  if (MK.rec && MK.rec.state !== "inactive") { try { MK.rec.stop(); } catch (e) {} }
  if (MK.recURL) { URL.revokeObjectURL(MK.recURL); MK.recURL = null; }
  MK.rec = null; MK.chunks = [];
}

/* ================= AFTER-RENDER / INIT ================= */

function afterRender(v) {
  if (v === "dashboard") startCountdown();
  else clearInterval(cdTimer);
}

loadState();
render();

/* keep time-sensitive views fresh (interview-day 3:30 PM switch, day rollover) */
setInterval(() => {
  const v = currentView();
  if (v === "interviewday") {
    const active = document.activeElement;
    if (!active || (active.tagName !== "TEXTAREA" && active.tagName !== "INPUT")) render();
  }
}, 60000);

</script>
</body>
