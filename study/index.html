<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>O-Level Study Deck | Physics · Chemistry · History</title>
<meta name="description" content="A study app for Singapore O-Level Pure Physics and Pure Chemistry definitions (2026 syllabus) and Elective History (Express) chapters and key events." />
<meta name="theme-color" content="#0B1120" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;
  --bg-alt:#0D1424;
  --card:#111827;
  --card-hover:#141d30;
  --border:rgba(148,163,184,0.14);
  --border-strong:rgba(148,163,184,0.26);
  --blue:#2563EB;
  --blue-bright:#3B82F6;
  --blue-soft:rgba(37,99,235,0.12);
  --green:#22C55E;
  --green-soft:rgba(34,197,94,0.12);
  --amber:#F59E0B;
  --white:#F8FAFC;
  --slate-100:#E2E8F0;
  --slate-300:#CBD5E1;
  --slate-400:#94A3B8;
  --slate-500:#64748B;
  --font:ui-serif,Georgia,Cambria,'Times New Roman',Times,serif;
  --font-display:'Newsreader',ui-serif,Georgia,Cambria,'Times New Roman',Times,serif;
  --container:1080px;
  --radius:14px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--slate-300);
  font-family:var(--font); font-size:16px; line-height:1.65;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
img{max-width:100%; display:block;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; background:none; border:none; color:inherit;}
ul{list-style:none;}
input,textarea{font-family:inherit;}
h1,h2,h3,h4{color:var(--white); font-weight:600; line-height:1.2; letter-spacing:-0.005em; font-family:var(--font-display);}
.container{max-width:var(--container); margin:0 auto; padding:0 20px;}
@media(min-width:768px){.container{padding:0 32px;}}

/* Header */
header{
  position:sticky; top:0; z-index:50; background:rgba(11,17,32,0.86);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
}
.head-inner{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 0;}
.brand{display:flex; align-items:center; gap:12px;}
.brand-mark{
  width:38px; height:38px; border-radius:10px; background:var(--blue-soft);
  border:1px solid var(--border-strong); display:grid; place-items:center;
  color:var(--blue-bright); font-family:var(--font-display); font-weight:700; font-size:18px;
}
.brand h1{font-size:1.02rem; letter-spacing:-0.01em;}
.brand span{display:block; font-size:12px; color:var(--slate-500); font-family:var(--font); font-weight:400;}
.home-link{font-size:13px; color:var(--slate-400); border:1px solid var(--border); padding:8px 14px; border-radius:9px; transition:.25s var(--ease);}
.home-link:hover{color:var(--white); border-color:var(--border-strong);}

/* Subject tabs */
.tabs{display:flex; gap:8px; overflow-x:auto; padding:12px 0; border-bottom:1px solid var(--border); -ms-overflow-style:none; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
  font-size:14px; font-weight:500; padding:10px 18px; border-radius:10px;
  color:var(--slate-400); border:1px solid transparent; transition:.25s var(--ease);
}
.tab:hover{color:var(--white); background:var(--card);}
.tab.active{color:var(--white); background:var(--blue-soft); border-color:var(--border-strong);}
.tab .dot{width:8px; height:8px; border-radius:50%;}
.tab-phys .dot{background:#38BDF8;}
.tab-chem .dot{background:#34D399;}
.tab-hist .dot{background:#F59E0B;}

/* Hero intro per subject */
.subject-hero{padding:40px 0 8px;}
.eyebrow{display:inline-block; font-size:12px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--blue-bright); margin-bottom:12px;}
.subject-hero h2{font-size:clamp(1.7rem,4vw,2.4rem);}
.subject-hero p{margin-top:12px; max-width:640px; color:var(--slate-400);}

/* Controls bar */
.controls{
  display:flex; flex-wrap:wrap; gap:12px; align-items:center;
  margin:28px 0 8px; padding:14px; background:var(--card);
  border:1px solid var(--border); border-radius:12px;
}
.search{flex:1; min-width:180px; position:relative;}
.search input{
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--white); padding:11px 14px 11px 38px; border-radius:10px; font-size:14px;
}
.search input::placeholder{color:var(--slate-500);}
.search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--slate-500);}
.seg{display:inline-flex; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:3px;}
.seg button{font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; color:var(--slate-400); transition:.2s var(--ease);}
.seg button.on{background:var(--blue); color:#fff;}
.stat{font-size:13px; color:var(--slate-400); white-space:nowrap;}
.stat b{color:var(--white); font-weight:600;}

/* Topic pills */
.topic-nav{display:flex; flex-wrap:wrap; gap:8px; margin:20px 0 6px;}
.topic-pill{
  font-size:13px; padding:7px 14px; border-radius:20px; border:1px solid var(--border);
  color:var(--slate-400); transition:.2s var(--ease);
}
.topic-pill:hover{color:var(--white); border-color:var(--border-strong);}
.topic-pill.active{background:var(--blue-soft); color:var(--blue-bright); border-color:var(--border-strong);}

/* Definition cards grid */
.topic-block{margin-top:36px;}
.topic-block h3{font-size:1.35rem; margin-bottom:4px;}
.topic-block .topic-sub{font-size:13px; color:var(--slate-500); margin-bottom:20px;}
.card-grid{display:grid; grid-template-columns:1fr; gap:14px;}
@media(min-width:640px){.card-grid{grid-template-columns:1fr 1fr;}}

.flash{
  position:relative; background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:20px; min-height:132px; cursor:pointer;
  transition:border-color .25s var(--ease), transform .25s var(--ease), background .25s var(--ease);
}
.flash:hover{border-color:var(--border-strong); transform:translateY(-2px);}
.flash.known{border-color:rgba(34,197,94,0.4); background:rgba(34,197,94,0.04);}
.flash .term{font-family:var(--font-display); color:var(--white); font-size:1.12rem; font-weight:600; padding-right:34px;}
.flash .prompt{margin-top:10px; font-size:13px; color:var(--slate-500); font-style:italic;}
.flash .def{margin-top:12px; color:var(--slate-300); font-size:15px; line-height:1.6;}
.flash .def.hidden{display:none;}
.flash .extra{margin-top:10px; font-size:13px; color:var(--slate-400); border-top:1px solid var(--border); padding-top:10px;}
.flash .extra.hidden{display:none;}
.flash .mark{
  position:absolute; top:14px; right:14px; width:26px; height:26px; border-radius:50%;
  border:1px solid var(--border-strong); display:grid; place-items:center;
  color:var(--slate-500); transition:.2s var(--ease); font-size:14px;
}
.flash .mark:hover{color:var(--white); border-color:var(--slate-400);}
.flash.known .mark{background:var(--green); color:#04140a; border-color:var(--green);}

/* Quiz mode reveal button */
.reveal-hint{margin-top:14px; font-size:12px; color:var(--blue-bright); letter-spacing:.03em;}

/* History */
.hist-intro{display:grid; gap:14px; grid-template-columns:1fr; margin-top:24px;}
@media(min-width:720px){.hist-intro{grid-template-columns:1fr 1fr 1fr;}}
.mini-card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px;}
.mini-card h4{font-size:1rem; margin-bottom:6px;}
.mini-card p{font-size:13px; color:var(--slate-400);}

.chapter{background:var(--card); border:1px solid var(--border); border-radius:14px; margin-top:16px; overflow:hidden;}
.chapter-head{display:flex; align-items:flex-start; gap:16px; padding:22px; cursor:pointer; transition:background .2s var(--ease);}
.chapter-head:hover{background:var(--card-hover);}
.chapter-num{
  flex-shrink:0; width:44px; height:44px; border-radius:11px; background:var(--blue-soft);
  border:1px solid var(--border-strong); display:grid; place-items:center;
  color:var(--blue-bright); font-family:var(--font-display); font-weight:700; font-size:19px;
}
.chapter-head .ch-title{flex:1;}
.chapter-head h3{font-size:1.22rem;}
.chapter-head .ch-q{font-size:13px; color:var(--slate-500); margin-top:4px; font-style:italic;}
.chapter-head .chev{flex-shrink:0; color:var(--slate-500); transition:transform .3s var(--ease); margin-top:8px;}
.chapter.open .chev{transform:rotate(180deg);}
.chapter-body{display:none; padding:0 22px 26px; border-top:1px solid var(--border);}
.chapter.open .chapter-body{display:block;}

.ch-section{margin-top:24px;}
.ch-section h4{font-size:1.02rem; color:var(--blue-bright); margin-bottom:10px; letter-spacing:.01em;}
.ch-section p{margin-bottom:12px; color:var(--slate-300);}
.ch-section ul.bullets{margin:0 0 12px; padding-left:2px;}
.ch-section ul.bullets li{position:relative; padding-left:20px; margin-bottom:8px; color:var(--slate-300);}
.ch-section ul.bullets li:before{content:"—"; position:absolute; left:0; color:var(--blue-bright);}
.ch-section li b{color:var(--white); font-weight:600;}

/* Timeline */
.timeline{margin-top:12px; border-left:2px solid var(--border-strong); padding-left:22px;}
.tl-item{position:relative; padding-bottom:20px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item:before{content:""; position:absolute; left:-29px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--blue); border:2px solid var(--bg);}
.tl-date{font-family:var(--font-display); color:var(--white); font-weight:600; font-size:15px;}
.tl-text{font-size:14px; color:var(--slate-400); margin-top:2px;}

.keyterms{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
.keyterm{font-size:12.5px; padding:6px 12px; border-radius:8px; background:var(--blue-soft); color:var(--slate-100); border:1px solid var(--border);}

/* Empty state */
.empty{text-align:center; padding:60px 20px; color:var(--slate-500);}

/* Footer note */
.foot{border-top:1px solid var(--border); margin-top:70px; padding:30px 0 50px; color:var(--slate-500); font-size:13px;}
.foot p{margin-bottom:8px;}
.note{background:var(--blue-soft); border:1px solid var(--border-strong); border-radius:12px; padding:16px 18px; margin-top:26px; font-size:13.5px; color:var(--slate-300);}
.note b{color:var(--white);}

.hidden{display:none !important;}
.reset-btn{font-size:12px; color:var(--slate-500); text-decoration:underline; text-underline-offset:3px;}
.reset-btn:hover{color:var(--slate-300);}
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="head-inner">
      <div class="brand">
        <div class="brand-mark">O</div>
        <div>
          <h1>O-Level Study Deck</h1>
          <span>Pure Physics · Pure Chemistry · Elective History</span>
        </div>
      </div>
      <a class="home-link" href="../index.html">← Portfolio</a>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab tab-phys active" data-subject="physics"><span class="dot"></span>Physics</button>
      <button class="tab tab-chem" data-subject="chemistry"><span class="dot"></span>Chemistry</button>
      <button class="tab tab-hist" data-subject="history"><span class="dot"></span>History</button>
    </nav>
  </div>
</header>

<main class="container" id="app"></main>

<script>
/* ============================================================
   DATA — Singapore O-Level (2026). Definitions written in the
   phrasing examiners look for. Verify against the official SEAB
   syllabus & your school notes before your exam.
   ============================================================ */

const PHYSICS = {
  intro: "Every mark-earning definition from the O-Level Pure Physics (6091) syllabus. Flip a card to reveal the answer, or switch to Quiz mode to test yourself first.",
  topics: [
    { name:"Measurement & Kinematics", cards:[
      { t:"Scalar quantity", d:"A physical quantity that has magnitude only.", x:"e.g. distance, speed, mass, time, energy." },

      { t:"Force", d:"A push or pull that can change the size, shape, or motion of an object.", x:"SI unit: newton (N)." },
      { t:"Newton's First Law", d:"An object will continue in its state of rest or uniform motion in a straight line unless acted upon by a resultant force." },
      { t:"Newton's Second Law", d:"When a resultant force acts on an object, the object accelerates in the direction of the force; the resultant force equals the rate of change of momentum (F = ma for constant mass)." },

      { t:"Resultant force", d:"The single force that has the same effect as all the forces acting on an object combined." },
      { t:"Inertia", d:"The reluctance of an object to change its state of rest or motion, due to its mass." },
    ]},
    { name:"Mass, Weight & Density", cards:[
      { t:"Mass", d:"A measure of the amount of substance in a body; it is also a measure of its inertia.", x:"SI unit: kilogram (kg). Constant everywhere." },
      { t:"Weight", d:"The gravitational force acting on an object.", x:"W = mg. SI unit: newton (N)." },
      { t:"Gravitational field strength (g)", d:"The gravitational force acting per unit mass.", x:"g ≈ 10 N/kg on Earth. Equal to acceleration of free fall." },

    ]},
    { name:"Moments & Equilibrium", cards:[
      { t:"Moment of a force", d:"The product of the force and the perpendicular distance from the pivot to the line of action of the force.", x:"Moment = F × d. SI unit: newton metre (N m)." },
      { t:"Principle of moments", d:"When a body is in equilibrium, the sum of clockwise moments about a pivot equals the sum of anticlockwise moments about the same pivot." },
      { t:"Centre of gravity", d:"The point through which the whole weight of an object appears to act." },
      { t:"Stability", d:"A measure of a body's ability to return to its original position after being tilted slightly." },
    ]},
    { name:"Pressure", cards:[
      { t:"Pressure", d:"The force acting per unit area, applied perpendicular to the surface.", x:"p = F/A. SI unit: pascal (Pa) = N/m²." },
      { t:"Pressure in a liquid", d:"The pressure due to a column of liquid, which increases with depth.", x:"p = hρg (h = depth, ρ = density, g = gravitational field strength)." },
    ]},
    { name:"Energy, Work & Power", cards:[
      { t:"Work done", d:"The product of the force and the distance moved in the direction of the force.", x:"W = F × d. SI unit: joule (J)." },
      { t:"Energy", d:"The capacity to do work.", x:"SI unit: joule (J)." },
      { t:"Kinetic energy", d:"The energy possessed by a body due to its motion.", x:"E_k = ½mv²." },
      { t:"Gravitational potential energy", d:"The energy possessed by a body due to its height above a reference level.", x:"E_p = mgh." },
      { t:"Principle of conservation of energy", d:"Energy cannot be created or destroyed; it can only be converted from one form to another, and the total energy in an isolated system remains constant." },
      { t:"Power", d:"The rate of doing work, or the rate of energy transfer.", x:"P = W/t = E/t. SI unit: watt (W)." },
      { t:"Efficiency", d:"The ratio of useful energy output to total energy input, expressed as a percentage.", x:"Efficiency = (useful output / total input) × 100%." },
    ]},
    { name:"Thermal Physics", cards:[
      { t:"Temperature", d:"A measure of the degree of hotness of a body.", x:"SI unit: kelvin (K)." },
      { t:"Internal energy", d:"The sum of the kinetic and potential energies of the molecules of a substance." },
      { t:"Heat capacity", d:"The amount of thermal energy required to raise the temperature of a body by 1 K (or 1 °C).", x:"SI unit: J/K." },
      { t:"Specific heat capacity", d:"The amount of thermal energy required to raise the temperature of a unit mass (1 kg) of a substance by 1 K.", x:"E = mcΔθ. SI unit: J/(kg·K)." },
      { t:"Latent heat", d:"The thermal energy absorbed or released by a substance during a change of state, without any change in temperature." },
      { t:"Specific latent heat of fusion", d:"The amount of thermal energy required to change a unit mass of a substance from solid to liquid without a change in temperature." },
      { t:"Specific latent heat of vaporisation", d:"The amount of thermal energy required to change a unit mass of a substance from liquid to gas without a change in temperature." },
      { t:"Conduction", d:"The transfer of thermal energy through a medium without any flow of the medium, by molecular vibration and free electron movement." },
      { t:"Convection", d:"The transfer of thermal energy through a fluid by means of convection currents caused by density differences." },
      { t:"Radiation", d:"The transfer of thermal energy in the form of electromagnetic waves (infrared), without needing a medium." },
      { t:"Boiling", d:"The change of state from liquid to gas that occurs throughout the liquid at a fixed temperature (the boiling point)." },
      { t:"Evaporation", d:"The change of state from liquid to gas that occurs only at the surface of a liquid, at any temperature." },
    ]},
    { name:"Waves", cards:[
      { t:"Wave", d:"A disturbance that transfers energy from one point to another without transferring the medium itself." },
      { t:"Transverse wave", d:"A wave in which the particles of the medium vibrate perpendicular to the direction of energy transfer.", x:"e.g. light, water waves." },
      { t:"Longitudinal wave", d:"A wave in which the particles of the medium vibrate parallel to the direction of energy transfer.", x:"e.g. sound waves." },
      { t:"Amplitude", d:"The maximum displacement of a particle from its rest (equilibrium) position." },
      { t:"Wavelength", d:"The distance between two successive points in phase (e.g. two crests).", x:"Symbol λ. SI unit: metre." },

      { t:"Frequency", d:"The number of complete waves produced (or passing a point) per unit time.", x:"f = 1/T. SI unit: hertz (Hz)." },
      { t:"Wave speed", d:"The distance moved by a wavefront per unit time.", x:"v = fλ." },

    { name:"Light & EM Spectrum", cards:[

    { name:"Magnetism & Electromagnetism", cards:[

      { t:"Electromagnetic induction", d:"The production of an e.m.f. across a conductor when it experiences a change in the magnetic flux linking it." },
      { t:"Faraday's Law", d:"The magnitude of the induced e.m.f. is directly proportional to the rate of change of magnetic flux linkage." },
      { t:"Lenz's Law", d:"The direction of the induced current is such that it always opposes the change producing it." },
      { t:"Fleming's left-hand rule", d:"Used to find the direction of force on a current-carrying conductor in a magnetic field: thumb = force/motion, first finger = field, second finger = current." },
    ]},
    { name:"Radioactivity", cards:[
      { t:"Radioactive decay", d:"The spontaneous and random emission of radiation from an unstable atomic nucleus." },
      { t:"Half-life", d:"The time taken for half the number of undecayed nuclei in a radioactive sample to decay (or for the activity to fall to half its value)." },
      { t:"Isotopes", d:"Atoms of the same element that have the same number of protons (proton number) but a different number of neutrons (different nucleon number)." },
      { t:"Proton (atomic) number", d:"The number of protons in the nucleus of an atom." },
      { t:"Nucleon (mass) number", d:"The total number of protons and neutrons in the nucleus of an atom." },

};

const CHEMISTRY = {
  intro: "The definitions the O-Level Pure Chemistry (6092) syllabus expects you to state precisely. Flip to reveal, or Quiz yourself first.",
  topics: [

/* localStorage: known cards */
function knownKey(sub){ return 'osd-known-'+sub; }
function getKnown(sub){ try{ return JSON.parse(localStorage.getItem(knownKey(sub))||'[]'); }catch(e){ return []; } }
function setKnown(sub, arr){ localStorage.setItem(knownKey(sub), JSON.stringify(arr)); }
function isKnown(sub, id){ return getKnown(sub).includes(id); }
function toggleKnown(sub, id){
  const arr = getKnown(sub); const i = arr.indexOf(id);
  if(i>=0) arr.splice(i,1); else arr.push(id);
  setKnown(sub, arr); return arr.includes(id);
}

document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab'); if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  state.subject = btn.dataset.subject;
  state.topic = 'all'; state.query='';
  render();
});

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function matches(card, q){
  if(!q) return true;
  q = q.toLowerCase();
  return (card.t + ' ' + card.d + ' ' + (card.x||'')).toLowerCase().includes(q);
}

function render(){
  if(state.subject==='history'){ renderHistory(); return; }
  renderDeck(DATA[state.subject]);
  window.scrollTo({top:0, behavior:'instant'});
}

    <label class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search definitions…" value="${esc(state.query)}"/>
    </label>
    <div class="seg" id="modeSeg">
      <button class="${state.mode==='flashcard'?'on':''}" data-mode="flashcard">Flashcards</button>
      <button class="${state.mode==='quiz'?'on':''}" data-mode="quiz">Quiz mode</button>
    </div>
    <span class="stat"><b>${knownCount}</b> / ${total} learnt · <a href="#" class="reset-btn" id="resetKnown">reset</a></span>
  </div>

  <div class="topic-nav" id="topicNav">
    <button class="topic-pill ${state.topic==='all'?'active':''}" data-topic="all">All topics</button>
    ${subj.topics.map(t=>`<button class="topic-pill ${state.topic===t.name?'active':''}" data-topic="${esc(t.name)}">${esc(t.name)}</button>`).join('')}
  </div>
  <div id="deck"></div>`;

  app.innerHTML = html + footerHTML();
  wireDeck(subj, allCards);
  drawCards(subj, allCards);
}

function drawCards(subj, allCards){
  const sub = state.subject;
  const deck = document.getElementById('deck');
  const topics = state.topic==='all' ? subj.topics : subj.topics.filter(t=>t.name===state.topic);
  let out = '';
  let shown = 0;
  topics.forEach(t=>{
    const cards = t.cards
      .map((c,ci)=>({...c, id:sub+'-'+subj.topics.indexOf(t)+'-'+ci}))
      .filter(c=>matches(c, state.query));
    if(!cards.length) return;
    shown += cards.length;
    out += `<div class="topic-block"><h3>${esc(t.name)}</h3><div class="topic-sub">${cards.length} definition${cards.length>1?'s':''}</div><div class="card-grid">`;
    cards.forEach(c=>{
      const known = isKnown(sub, c.id);
      const quiz = state.mode==='quiz';
      out += `
      <div class="flash ${known?'known':''}" data-id="${c.id}">
        <button class="mark" data-mark="${c.id}" title="Mark as learnt">✓</button>
        <div class="term">${esc(c.t)}</div>
        ${quiz ? `<div class="prompt">Define this — then tap to check.</div>` : ``}
        <div class="def ${quiz?'hidden':''}">${esc(c.d)}</div>
        ${c.x ? `<div class="extra ${quiz?'hidden':''}">${esc(c.x)}</div>` : ``}
        ${quiz ? `<div class="reveal-hint">Tap to reveal ▾</div>` : ``}
      </div>`;
    });
    out += `</div></div>`;
  });
  deck.innerHTML = shown ? out : `<div class="empty">No definitions match "${esc(state.query)}".</div>`;

  // card interactions
  deck.querySelectorAll('.flash').forEach(card=>{
    card.addEventListener('click', e=>{
      if(e.target.closest('.mark')) return;
      const def = card.querySelector('.def');
      const extra = card.querySelector('.extra');
      const hint = card.querySelector('.reveal-hint');
      if(def){ def.classList.toggle('hidden'); }
      if(extra){ extra.classList.toggle('hidden'); }
      if(hint){ hint.style.display = def && def.classList.contains('hidden') ? 'block':'none'; }
    });
  });
  deck.querySelectorAll('.mark').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const id = btn.dataset.mark;
      toggleKnown(state.subject, id);
      renderDeck(DATA[state.subject]); // refresh counts
    });
  });
}

function wireDeck(subj, allCards){
  const search = document.getElementById('search');
  search.addEventListener('input', ()=>{ state.query = search.value; drawCards(subj, allCards); });
  document.getElementById('modeSeg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    state.mode = b.dataset.mode;
    document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    drawCards(subj, allCards);
  });
  document.getElementById('topicNav').addEventListener('click', e=>{
    const b = e.target.closest('.topic-pill'); if(!b) return;
    state.topic = b.dataset.topic;
    document.querySelectorAll('.topic-pill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    drawCards(subj, allCards);
  });
  const reset = document.getElementById('resetKnown');
  reset.addEventListener('click', e=>{
    e.preventDefault();
    if(confirm('Reset your learnt progress for this subject?')){
      setKnown(state.subject, []);
      renderDeck(DATA[state.subject]);
    }
  });
}

/* ---- History ---- */
function renderHistory(){
  const H = HISTORY;
  let html = `
  <section class="subject-hero">
    <span class="eyebrow">Elective History · Express · Shaping the Modern World</span>
    <h2>Elective History — Full Course</h2>
    <p>${esc(H.intro)}</p>
  </section>
  <div class="hist-intro">
    ${H.cards.map(c=>`<div class="mini-card"><h4>${esc(c.h)}</h4><p>${esc(c.p)}</p></div>`).join('')}
  </div>
  <div id="chapters" style="margin-top:32px;">`;

  H.chapters.forEach((ch, i)=>{
    html += `
    <div class="chapter ${i===0?'open':''}" data-ch="${i}">
      <div class="chapter-head">
        <div class="chapter-num">${ch.n}</div>
        <div class="ch-title">
          <h3>${esc(ch.title)}</h3>
          <div class="ch-q">${esc(ch.q)}</div>
        </div>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="chapter-body">${ch.sections.map(renderSection).join('')}</div>
    </div>`;
  });
  html += `</div>`;
  app.innerHTML = html + footerHTML();

  document.querySelectorAll('.chapter-head').forEach(head=>{
    head.addEventListener('click', ()=> head.parentElement.classList.toggle('open'));
  });
  window.scrollTo({top:0, behavior:'instant'});
}

function renderSection(s){
  if(s.type==='text'){
    return `<div class="ch-section"><h4>${esc(s.h)}</h4>${s.body.map(p=>`<p>${p}</p>`).join('')}</div>`;
  }
  if(s.type==='bullets'){
    return `<div class="ch-section"><h4>${esc(s.h)}</h4><ul class="bullets">${s.body.map(li=>`<li>${li}</li>`).join('')}</ul></div>`;
  }
  if(s.type==='terms'){
    return `<div class="ch-section"><h4>${esc(s.h)}</h4><div class="keyterms">${s.body.map(t=>`<span class="keyterm">${esc(t)}</span>`).join('')}</div></div>`;
  }
  if(s.type==='timeline'){
    return `<div class="ch-section"><h4>${esc(s.h)}</h4><div class="timeline">${s.body.map(e=>`<div class="tl-item"><div class="tl-date">${esc(e.d)}</div><div class="tl-text">${esc(e.t)}</div></div>`).join('')}</div></div>`;
  }
  return '';
}

function footerHTML(){
  return `
  <div class="foot">
    <div class="note">
      <b>Study smart:</b> These notes follow the Singapore O-Level 2026 syllabuses (Pure Physics 6091, Pure Chemistry 6092, Elective History — Express). Definitions are written the way examiners award marks, but always cross-check with your own school notes and the official SEAB syllabus before your exam.
    </div>
    <p style="margin-top:22px;">Built as a personal revision tool · Physics · Chemistry · History</p>
    <p>Your "learnt" progress is saved in this browser only.</p>
  </div>`;
}

render();
</script>

</html>
